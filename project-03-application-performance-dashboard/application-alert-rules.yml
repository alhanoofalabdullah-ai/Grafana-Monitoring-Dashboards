groups:

- name: ApplicationPerformanceAlerts

  rules:

  - alert: ApplicationDown

    expr: up == 0

    for: 1m

    labels:
      severity: critical

  - alert: HighResponseTime

    expr: rate(http_request_duration_seconds_sum[5m])
      /
      rate(http_request_duration_seconds_count[5m]) > 2

    for: 5m

    labels:
      severity: warning

  - alert: HighErrorRate

    expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05

    for: 5m

    labels:
      severity: critical

  - alert: ServiceDegradation

    expr: application_health_score < 80

    for: 5m

    labels:
      severity: critical
