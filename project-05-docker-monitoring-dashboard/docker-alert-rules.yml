groups:

- name: DockerMonitoringAlerts

  rules:

  - alert: ContainerDown

    expr: up == 0

    for: 1m

    labels:
      severity: critical

  - alert: HighContainerCPUUsage

    expr: rate(container_cpu_usage_seconds_total[5m]) > 0.80

    for: 5m

    labels:
      severity: warning

  - alert: HighContainerMemoryUsage

    expr: container_memory_usage_bytes > 858993459

    for: 5m

    labels:
      severity: warning

  - alert: ContainerRestartLoop

    expr: changes(container_start_time_seconds[10m]) > 5

    for: 2m

    labels:
      severity: critical

  - alert: DockerHostDiskCritical

    expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10

    for: 5m

    labels:
      severity: critical
