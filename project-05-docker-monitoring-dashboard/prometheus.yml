global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/docker-alert-rules.yml"

scrape_configs:

  - job_name: "cadvisor"

    static_configs:

      - targets:
          - "cadvisor:8080"

  - job_name: "node-exporter"

    static_configs:

      - targets:
          - "node-exporter:9100"
