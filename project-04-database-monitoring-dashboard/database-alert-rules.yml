groups:

- name: DatabaseAlerts

  rules:

  - alert: DatabaseDown

    expr: up == 0

    for: 1m

    labels:
      severity: critical

  - alert: HighConnectionUsage

    expr: database_connection_usage_percent > 80

    for: 5m

    labels:
      severity: warning

  - alert: SlowQueriesDetected

    expr: database_slow_queries_total > 10

    for: 5m

    labels:
      severity: warning

  - alert: StorageCritical

    expr: database_storage_usage_percent > 90

    for: 5m

    labels:
      severity: critical

  - alert: HighQueryLatency

    expr: database_query_latency_seconds > 5

    for: 5m

    labels:
      severity: critical
