groups:

- name: DevOpsAlerts

  rules:

  - alert: PipelineFailure

    expr: pipeline_failed_total > 0

    for: 2m

    labels:
      severity: critical

  - alert: HighBuildFailureRate

    expr: build_failure_rate > 20

    for: 5m

    labels:
      severity: warning

  - alert: DeploymentFailure

    expr: deployment_failed_total > 0

    for: 2m

    labels:
      severity: critical

  - alert: LongBuildDuration

    expr: build_duration_minutes > 30

    for: 5m

    labels:
      severity: warning
