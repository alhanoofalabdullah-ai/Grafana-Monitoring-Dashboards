groups:

- name: BusinessKPIAlerts

  rules:

  - alert: RevenueDecline

    expr: revenue_growth_rate < -10

    for: 30m

    labels:
      severity: critical

  - alert: CustomerChurnIncrease

    expr: customer_churn_rate > 5

    for: 30m

    labels:
      severity: warning

  - alert: FinancialRiskDetected

    expr: financial_risk_score > 80

    for: 15m

    labels:
      severity: critical

  - alert: OperationalPerformanceDrop

    expr: productivity_score < 70

    for: 30m

    labels:
      severity: warning

  - alert: StrategicKPIFailure

    expr: strategic_goal_completion < 75

    for: 1h

    labels:
      severity: critical
