groups:

- name: kubernetes-alerts

  rules:

  - alert: HighNodeCPU

    expr: 100 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100 > 85

    for: 2m

    labels:
      severity: critical

  - alert: PodFailure

    expr: kube_pod_status_phase{phase="Failed"} > 0

    for: 1m

    labels:
      severity: warning
