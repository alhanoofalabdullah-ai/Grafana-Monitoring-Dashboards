global:
  scrape_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:

  - job_name: "api-gateway"
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: "user-service"
    static_configs:
      - targets:
          - user-service:8081

  - job_name: "order-service"
    static_configs:
      - targets:
          - order-service:8082

  - job_name: "monitoring-service"
    static_configs:
      - targets:
          - monitoring-service:8083
