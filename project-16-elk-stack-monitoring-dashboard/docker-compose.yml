version: "3.9"

services:

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"

  logstash:
    image: logstash:8.13.0
    volumes:
      - ./logstash:/usr/share/logstash/pipeline
      - ./logs:/logs

  kibana:
    image: kibana:8.13.0
    ports:
      - "5601:5601"

  elk-monitor-api:
    build: ./elk-monitor-api
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
