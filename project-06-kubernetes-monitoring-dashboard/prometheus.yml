global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/kubernetes-alert-rules.yml"

scrape_configs:

  - job_name: "kube-state-metrics"

    static_configs:

      - targets:
          - "kube-state-metrics:8080"

  - job_name: "node-exporter"

    static_configs:

      - targets:
          - "node-exporter:9100"
