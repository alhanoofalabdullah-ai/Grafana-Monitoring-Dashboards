version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: monitoring-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: enterprise_monitoring_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  mysql-exporter:
    image: prom/mysqld-exporter
    container_name: mysql-exporter
    ports:
      - "9104:9104"
    environment:
      DATA_SOURCE_NAME: "root:password@(mysql:3306)/"
    depends_on:
      - mysql

  database-monitor-api:
    build: ./database-monitor-api
    container_name: database-monitor-api
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus
    container_name: database-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    depends_on:
      - mysql-exporter
      - database-monitor-api

  grafana:
    image: grafana/grafana
    container_name: database-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
