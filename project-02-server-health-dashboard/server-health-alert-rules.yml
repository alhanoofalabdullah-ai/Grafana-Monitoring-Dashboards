groups:

- name: ServerHealthAlerts

  rules:

  - alert: ServerDown

    expr: up == 0

    for: 1m

    labels:
      severity: critical

  - alert: HighCPUUsage

    expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85

    for: 5m

    labels:
      severity: warning

  - alert: HighMemoryUsage

    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85

    for: 5m

    labels:
      severity: warning

  - alert: DiskSpaceCritical

    expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10

    for: 5m

    labels:
      severity: critical

  - alert: HardwareFailureDetected

    expr: server_hardware_health_status == 0

    for: 1m

    labels:
      severity: critical
