groups:
  - name: sla-alerts
    rules:
      - alert: SlaApiDown
        expr: up{job="sla-api"} == 0
        for: 1m
        labels:
          severity: critical

      - alert: HighSlaBreachRisk
        expr: http_server_requests_seconds_count > 1000
        for: 5m
        labels:
          severity: warning
