groups:

- name: ExecutiveKPIAlerts

  rules:

  - alert: RevenueDecline

    expr: revenue_growth_rate < 0

    for: 30m

    labels:
      severity: critical

  - alert: CustomerChurnIncrease

    expr: customer_churn_rate > 5

    for: 30m

    labels:
      severity: warning

  - alert: LowCustomerSatisfaction

    expr: customer_satisfaction_score < 80

    for: 30m

    labels:
      severity: warning

  - alert: StrategicKPIFailure

    expr: strategic_goal_completion_rate < 70

    for: 1h

    labels:
      severity: critical

  - alert: BusinessRiskDetected

    expr: business_risk_score > 80

    for: 15m

    labels:
      severity: critical
