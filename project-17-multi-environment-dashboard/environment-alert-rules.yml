groups:

- name: MultiEnvironmentAlerts

  rules:

  - alert: EnvironmentDown

    expr: up == 0

    for: 2m

    labels:
      severity: critical

  - alert: ConfigurationDriftDetected

    expr: configuration_drift_score > 10

    for: 10m

    labels:
      severity: warning

  - alert: FailedDeployment

    expr: deployment_failure_total > 0

    for: 5m

    labels:
      severity: critical

  - alert: ReleaseReadinessFailed

    expr: release_readiness_score < 80

    for: 15m

    labels:
      severity: warning

  - alert: ProductionIncidentDetected

    expr: production_incidents_total > 0

    for: 5m

    labels:
      severity: critical
