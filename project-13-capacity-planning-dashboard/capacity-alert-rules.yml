groups:

- name: CapacityPlanningAlerts

  rules:

  - alert: CPUCapacityRisk

    expr: cpu_usage_percent > 80

    for: 10m

    labels:
      severity: warning

  - alert: MemoryCapacityRisk

    expr: memory_usage_percent > 85

    for: 10m

    labels:
      severity: warning

  - alert: StorageCapacityCritical

    expr: storage_usage_percent > 90

    for: 10m

    labels:
      severity: critical

  - alert: ForecastedResourceExhaustion

    expr: forecasted_capacity_days_remaining < 30

    for: 15m

    labels:
      severity: critical

  - alert: CapacityPlanningActionRequired

    expr: infrastructure_growth_rate > 20

    for: 30m

    labels:
      severity: warning
