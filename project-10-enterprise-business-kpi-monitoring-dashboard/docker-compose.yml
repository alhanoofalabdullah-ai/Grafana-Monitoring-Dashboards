version: "3.9"

services:

  business-kpi-api:

    build: ./business-kpi-api

    ports:
      - "8080:8080"

  prometheus:

    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus:/etc/prometheus

  grafana:

    image: grafana/grafana

    ports:
      - "3000:3000"
