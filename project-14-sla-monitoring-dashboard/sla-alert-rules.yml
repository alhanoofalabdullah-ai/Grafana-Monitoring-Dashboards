groups:

- name: SLAMonitoringAlerts

  rules:

  - alert: SLAViolation

    expr: sla_compliance_percent < 99

    for: 5m

    labels:
      severity: critical

  - alert: AvailabilityBelowTarget

    expr: service_availability_percent < 99.9

    for: 10m

    labels:
      severity: critical

  - alert: ResponseTimeBreach

    expr: response_time_ms > 2000

    for: 5m

    labels:
      severity: warning

  - alert: IncidentResolutionDelay

    expr: mttr_hours > 4

    for: 15m

    labels:
      severity: warning

  - alert: CustomerSatisfactionDrop

    expr: customer_satisfaction_score < 80

    for: 30m

    labels:
      severity: warning
