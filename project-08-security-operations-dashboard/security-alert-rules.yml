groups:

- name: SecurityMonitoringAlerts

  rules:

  - alert: ExcessiveFailedLogins

    expr: failed_login_attempts_total > 10

    for: 2m

    labels:
      severity: critical

  - alert: BruteForceAttack

    expr: failed_login_attempts_total > 50

    for: 1m

    labels:
      severity: critical

  - alert: UnauthorizedAccess

    expr: unauthorized_access_total > 0

    for: 1m

    labels:
      severity: critical

  - alert: SecurityIncidentDetected

    expr: security_incidents_total > 0

    for: 1m

    labels:
      severity: critical
