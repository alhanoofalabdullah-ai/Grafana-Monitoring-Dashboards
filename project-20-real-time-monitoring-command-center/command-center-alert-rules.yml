groups:

- name: EnterpriseCommandCenterAlerts

  rules:

  - alert: CriticalInfrastructureFailure
    expr: infrastructure_health_score < 80

  - alert: SecurityBreachDetected
    expr: critical_threats_total > 0

  - alert: RevenuePerformanceRisk
    expr: revenue_growth_rate < 0

  - alert: CloudServiceOutage
    expr: cloud_availability < 99

  - alert: EnterpriseHealthScoreLow
    expr: enterprise_health_score < 80

  - alert: CriticalIncidentOpen
    expr: critical_incidents_total > 0
