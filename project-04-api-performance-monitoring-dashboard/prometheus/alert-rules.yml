groups:
  - name: api-performance-alerts
    rules:
      - alert: ApiServiceDown
        expr: up{job="api-monitor-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API monitoring service is down"

      - alert: HighApiLatency
        expr: http_server_requests_seconds_sum / http_server_requests_seconds_count > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"

      - alert: HighApiErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate detected"
